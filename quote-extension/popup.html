<!doctype html>
<html>
  <head>
    <title>My Quote</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="popup-body">
    <h3 class="popup-h3" id="quote">
      "The only way to do great work is to love what you do."
    </h3>

    <p class="popup-p">
      -<span class="popup-span" id="author">Steve Jobs</span>
    </p>

    <button class="popup-button" id="newQuoteBtn">
      <span class="shadow"></span>
      <span class="edge"></span>
      <span class="front text"> Get New Quote </span>
    </button>
    <script src="popup.js"></script>
  </body>
</html>
